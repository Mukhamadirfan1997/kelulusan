<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelulusan Kelas 6 - SDN Toyaning I Rejoso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #e8f2f7 0%, #d9e6e1 100%); color: #1e293b; padding: 2rem 1.5rem; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .school-badge { background: white; display: inline-flex; align-items: center; gap: 12px; padding: 0.6rem 1.8rem; border-radius: 80px; margin-bottom: 1.5rem; border: 1px solid #cbdff2; }
        .school-badge i { font-size: 2rem; color: #2c6e9e; }
        .school-badge span { font-weight: 700; color: #0f2b4d; }
        h1 { font-size: 2.3rem; font-weight: 800; background: linear-gradient(135deg, #1e3c72, #2a7a3e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .subtitle { color: #2c5a2e; margin-top: 0.3rem; font-weight: 500; }
        .search-section { background: white; border-radius: 40px; padding: 1.5rem 2rem; margin-bottom: 2rem; border: 1px solid #c8e0d4; }
        .search-wrapper { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .search-box { flex: 3; }
        .search-box label { font-size: 0.75rem; font-weight: 600; color: #2c6e9e; display: block; margin-bottom: 6px; }
        .search-box input { width: 100%; padding: 0.8rem 1.2rem; border: 1.5px solid #c8e0d4; border-radius: 60px; font-size: 0.9rem; }
        .btn-cari { background: #2a7a3e; color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 60px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-cari:hover { background: #1f5f30; transform: translateY(-2px); }
        .btn-reset { background: #f1f5f9; color: #1e4780; border: 1px solid #cbd5e1; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; margin-top: 1rem; }
        .student-card { background: white; border-radius: 28px; padding: 1.3rem; cursor: pointer; transition: 0.2s; border: 1px solid #c8e0d4; }
        .student-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1); }
        .card-photo { width: 70px; height: 70px; border-radius: 50%; background: #e6f0ea; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; color: #2c6e9e; margin-bottom: 1rem; overflow: hidden; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { font-size: 1.3rem; font-weight: 700; color: #0f2b4d; }
        .lulus-badge { background: #dcfce7; color: #15803d; display: inline-block; padding: 0.2rem 1rem; border-radius: 40px; font-size: 0.7rem; font-weight: 600; margin-top: 0.5rem; }
        .empty-message { background: #f8fafc; text-align: center; padding: 2rem; border-radius: 48px; color: #2c6e9e; border: 1px dashed #c8e0d4; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; z-index: 1000; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container { background: white; max-width: 820px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 2rem; padding: 1.5rem; border-top: 6px solid #2a7a3e; position: relative; }
        .modal-close { position: absolute; right: 1.2rem; top: 1rem; font-size: 1.8rem; cursor: pointer; color: #888; }
        .modal-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
        .modal-photo { width: 80px; height: 80px; border-radius: 50%; background: #e2edf7; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; overflow: hidden; }
        .nilai-table { width: 100%; border-collapse: collapse; margin: 1rem 0; background: #f9fbfd; border-radius: 16px; overflow: hidden; }
        .nilai-table th, .nilai-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2edf2; }
        .nilai-table th { background: #eef3fc; font-weight: 600; }
        .download-gdrive { display: inline-block; background: #2c6e9e; color: white; padding: 0.6rem 1.2rem; border-radius: 40px; text-decoration: none; margin-top: 1rem; font-weight: 600; transition: 0.2s; }
        .download-gdrive:hover { background: #1f5a80; transform: translateY(-2px); }
        footer { margin-top: 3rem; text-align: center; border-top: 1px solid #c8e0d4; padding-top: 2rem; font-size: 0.75rem; color: #4b7b5e; }
        @media (max-width: 640px) { body { padding: 1rem; } .search-wrapper { flex-direction: column; } }
        .info-banner { background: #e0f2fe; padding: 10px 16px; border-radius: 30px; margin-top: 12px; font-size: 0.8rem; text-align: center; color: #0369a1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="school-badge"><i class="fas fa-school"></i><span>SDN TOYANING I REJOSO</span></div>
        <h1>Pengumuman Kelulusan</h1>
        <div class="subtitle">Tahun Pelajaran 2025/2026 | Kelas VI</div>
    </div>
    <div class="search-section">
        <div class="search-wrapper">
            <div class="search-box">
                <label><i class="fas fa-user-search"></i> Cari Nama atau NIS</label>
                <input type="text" id="searchInput" placeholder="Contoh: Ahmad, 12345" autocomplete="off">
            </div>
            <button id="searchBtn" class="btn-cari"><i class="fas fa-search"></i> Cari</button>
            <button id="resetBtn" class="btn-cari btn-reset"><i class="fas fa-undo-alt"></i> Reset</button>
        </div>
        <div class="info-banner"><i class="fas fa-database"></i> Data kelulusan diperbarui secara berkala.</div>
    </div>
    <div id="resultsArea">
        <div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Memuat data kelulusan...</div>
    </div>
    <footer>Data kelulusan resmi SDN Toyaning I Rejoso</footer>
</div>
<div id="detailModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-close" id="closeModalBtn">&times;</div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    const DATA_JSON_URL = "data.json";
    let studentsList = [];

    function toSafeString(val) {
        if (val === undefined || val === null) return '';
        return String(val);
    }

    async function loadData() {
        const resultsDiv = document.getElementById('resultsArea');
        resultsDiv.innerHTML = `<div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Mengambil data kelulusan...</div>`;
        try {
            const response = await fetch(DATA_JSON_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status} - file data.json tidak ditemukan`);
            const data = await response.json();
            if (!Array.isArray(data) || data.length === 0) throw new Error("Data kosong");
            
            studentsList = data.map((item, idx) => {
                const nama = item.nama || item.Nama || item.name || item.NAMA || "";
                let nis = item.nis || item.NIS || item.nomor_induk || item.NomorInduk || "";
                nis = toSafeString(nis);
                const linkSurat = item.link_surat || item.linkSurat || item.Link_Surat || item.surat || "";
                const foto = item.foto || item.Foto || item.photo || item.PHOTO || "";
                
                const nilai = {};
                for (let key in item) {
                    const lowerKey = key.toLowerCase();
                    if (!['nama', 'nis', 'link_surat', 'linksurat', 'foto', 'photo', 'name', 'nomor_induk', 'surat'].includes(lowerKey)) {
                        let val = item[key];
                        if (val !== undefined && val !== null && val !== "") {
                            let num = parseFloat(val);
                            if (!isNaN(num)) nilai[key] = num;
                        }
                    }
                }
                return { id: idx, nama: toSafeString(nama), nis, nilai, linkSurat, foto };
            }).filter(s => s.nama && s.nis);
            
            if (studentsList.length === 0) throw new Error("Tidak ada data siswa valid");
            resultsDiv.innerHTML = `<div class="empty-message"><i class="fas fa-check-circle"></i> ✅ ${studentsList.length} siswa lulus. Gunakan pencarian di atas.</div>`;
        } catch (err) {
            console.error(err);
            resultsDiv.innerHTML = `<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Gagal memuat data: ${err.message}<br><br>
            📌 <strong>Petunjuk:</strong> Buat file <code>data.json</code> dari spreadsheet Anda.<br>
            Cara: Buka spreadsheet → File → Download → CSV → konversi ke JSON (gunakan <a href="https://csvjson.com/" target="_blank">csvjson.com</a>)<br>
            Simpan hasilnya sebagai <code>data.json</code> di folder yang sama dengan halaman ini.</div>`;
            studentsList = [];
        }
    }

    function getInitials(nama) {
        if (!nama) return "?";
        let parts = nama.trim().split(/\s+/);
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    function renderCards(students) {
        const resultsDiv = document.getElementById('resultsArea');
        if (!students.length) {
            resultsDiv.innerHTML = `<div class="empty-message">😞 Tidak ada siswa yang cocok.</div>`;
            return;
        }
        let html = `<div style="margin-bottom:15px;"><span style="background:#e6f0ea; padding:4px 12px; border-radius:40px;">${students.length} siswa ditemukan</span></div><div class="students-grid">`;
        students.forEach(s => {
            const foto = s.foto && s.foto.trim() ? s.foto : null;
            const initial = getInitials(s.nama);
            html += `
                <div class="student-card" data-id="${s.id}">
                    <div class="card-photo">
                        ${foto ? `<img src="${escapeHtml(foto)}" onerror="this.onerror=null; this.parentElement.innerText='${initial}';" loading="lazy">` : initial}
                    </div>
                    <div class="card-name">${escapeHtml(s.nama)}</div>
                    <div class="card-nis">NIS: ${escapeHtml(s.nis)}</div>
                    <div class="lulus-badge"><i class="fas fa-check-circle"></i> LULUS</div>
                </div>
            `;
        });
        html += `</div>`;
        resultsDiv.innerHTML = html;
        document.querySelectorAll('.student-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.dataset.id);
                const student = students.find(s => s.id === id);
                if (student) showModal(student);
            });
        });
    }

    function searchStudent() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!query) {
            document.getElementById('resultsArea').innerHTML = `<div class="empty-message">Masukkan nama atau NIS terlebih dahulu.</div>`;
            return;
        }
        if (!studentsList.length) {
            document.getElementById('resultsArea').innerHTML = `<div class="empty-message">Data belum tersedia. Muat ulang halaman.</div>`;
            return;
        }
        const filtered = studentsList.filter(s => {
            const namaLower = toSafeString(s.nama).toLowerCase();
            const nisLower = toSafeString(s.nis).toLowerCase();
            return namaLower.includes(query) || nisLower.includes(query);
        });
        renderCards(filtered);
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        if (studentsList.length) {
            document.getElementById('resultsArea').innerHTML = `<div class="empty-message">🔍 Ketik nama/NIS lalu tekan Cari.</div>`;
        } else {
            document.getElementById('resultsArea').innerHTML = `<div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Memuat data...</div>`;
        }
    }

    function showModal(student) {
        const modal = document.getElementById('detailModal');
        const modalContent = document.getElementById('modalContent');
        let nilaiRows = '';
        const nilaiEntries = Object.entries(student.nilai);
        if (nilaiEntries.length === 0) {
            nilaiRows = `<tr><td colspan="3" style="text-align:center;">📭 Tidak ada data nilai untuk siswa ini</td></tr>`;
        } else {
            for (let [mapel, nilai] of nilaiEntries) {
                nilaiRows += `
                    <tr>
                        <td><strong>${escapeHtml(mapel)}</strong></td>
                        <td>${nilai}</td>
                        <td>${nilai >= 70 ? '<span style="color:#15803d;">✔️ Lulus</span>' : '<span style="color:#b91c1c;">📖 Perbaikan</span>'}</td>
                    </tr>
                `;
            }
        }
        
        const tanggal = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
        const suratHtml = `
            <div style="margin-top: 24px; border: 1px solid #d1d5db; border-radius: 16px; padding: 20px; background: #ffffff; font-family: 'Times New Roman', 'Inter', serif;">
                <div style="text-align: center; margin-bottom: 20px; border-bottom: 2px solid #2a7a3e; padding-bottom: 8px;">
                    <h3 style="margin: 0; font-size: 1.25rem;">SURAT KETERANGAN LULUS</h3>
                </div>
                <p style="margin-bottom: 12px; text-align: justify;">Yang bertanda tangan di bawah ini Kepala Sekolah Dasar Negeri Toyaning I Kecamatan Rejoso Kabupaten Pasuruan menerangkan bahwa :</p>
                <table style="width: 100%; margin: 10px 0; border-collapse: collapse; font-size: 0.95rem;">
                    <tr>
                        <td style="width: 120px; padding: 6px 0;">Nama</td>
                        <td style="width: 10px;">:</td>
                        <td style="padding: 6px 0;"><strong>${escapeHtml(student.nama)}</strong></td>
                    </tr>
                    <tr>
                        <td style="padding: 6px 0;">NISN</td>
                        <td>:</td>
                        <td style="padding: 6px 0;">${escapeHtml(student.nis)}</td>
                    </tr>
                    <table>
                        <td style="padding: 6px 0;">Tahun Pelajaran</td>
                        <td>:</td>
                        <td style="padding: 6px 0;">2025/2026</td>
                    </tr>
                </table>
                <p style="text-align: justify;">Berdasarkan hasil pertimbangan serta dengan memperhatikan kriteria kelulusan, dinyatakan :</p>
                <div style="text-align: center; margin: 18px 0;">
                    <span style="background: #15803d; color: white; padding: 8px 24px; border-radius: 40px; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;">LULUS</span>
                </div>
                <p style="text-align: justify;">dan berhak untuk mendapatkan Ijazah atau Surat Tanda Tamat Belajar (STTB) serta Surat Keterangan Hasil Ujian Nasional (SKHUN).</p>
                <div style="margin-top: 28px; text-align: right;">
                    <p>Rejoso, ${tanggal}</p>
                    <p style="margin-top: 30px;">Kepala Sekolah,</p>
                    <p style="margin-top: 40px;"><strong><u>SRI LESTARI, S.Pd</u></strong><br>NIP. 197103122000122003</p>
                </div>
            </div>
        `;
        
        const link = student.linkSurat && student.linkSurat.trim() ? student.linkSurat : '#';
        const downloadBtn = link !== '#' 
            ? `<a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer" class="download-gdrive"><i class="fab fa-google-drive"></i> Download Surat Kelulusan (PDF)</a>`
            : `<div class="download-gdrive" style="background:gray; cursor:default;">Link surat tidak tersedia</div>`;
        
        const fotoUrl = student.foto && student.foto.trim() ? student.foto : null;
        const initial = getInitials(student.nama);
        const photoHtml = fotoUrl 
            ? `<img src="${escapeHtml(fotoUrl)}" onerror="this.onerror=null; this.parentElement.innerText='${initial}';" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`
            : initial;
        
        modalContent.innerHTML = `
            <div class="modal-header">
                <div class="modal-photo">${photoHtml}</div>
                <div>
                    <h2>${escapeHtml(student.nama)}</h2>
                    <p>NIS: ${escapeHtml(student.nis)}</p>
                    <span class="lulus-badge"><i class="fas fa-trophy"></i> LULUS</span>
                </div>
            </div>
            <h3 style="margin: 18px 0 8px;"><i class="fas fa-chart-line"></i> Nilai Ujian</h3>
            <table class="nilai-table">
                <thead>
                    <tr><th>Mata Pelajaran</th><th>Nilai</th><th>Keterangan</th></tr>
                </thead>
                <tbody>${nilaiRows}</tbody>
            </table>
            ${suratHtml}
            <div style="margin-top: 20px; text-align: center;">
                ${downloadBtn}
            </div>
        `;
        modal.classList.add('active');
    }

    // Event listeners
    document.getElementById('searchBtn').addEventListener('click', searchStudent);
    document.getElementById('resetBtn').addEventListener('click', resetSearch);
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchStudent(); });
    const modal = document.getElementById('detailModal');
    const closeModal = () => modal.classList.remove('active');
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    loadData();
</script>
</body>
</html>
